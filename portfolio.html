<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Portfolio</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="239.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo:wght@300;400;600&display=swap"
      rel="stylesheet"
    />
    <style>
      /* FORCE CARDS VISIBLE - portfolio specific overrides */
      .superman {
        position: relative !important;
        height: 100vh !important;
        width: 100% !important;
        display: block !important;
        overflow: hidden !important;
      }
      .bg-video {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        height: 100% !important;
        object-fit: cover !important;
        z-index: 0 !important;
        pointer-events: none !important;
      }

      /* ── CARD COLUMN (right side) ── */
      .hero-cards {
        position: absolute !important;
        top: 60px !important;
        right: 30px !important;
        bottom: 20px;
        width: 850px !important;
        display: list-item;
        scroll-behavior: smooth;
        align-items: center !important;
        gap: 16px !important;
        z-index: 100 !important;
        pointer-events: none !important;
        overflow-y: auto !important;
        scrollbar-width: none !important;
        background-color: #00000000 !important;
        height: 1100px !important;
        padding: 20px;
      }
      .hero-cards::-webkit-scrollbar {
        display: none !important;
      }

      /* ── CARD ── */
      .hero-cards .project-card {
        pointer-events: auto !important;

        width: 800px !important;
        height: auto !important;
        border-radius: 18px !important;
        overflow: hidden !important;
        background: rgba(20, 20, 20, 0.82) !important;
        backdrop-filter: blur(14px) !important;
        -webkit-backdrop-filter: blur(14px) !important;
        border: 1px solid rgba(255, 255, 255, 0.18) !important;
        box-shadow: 0 10px 32px rgba(0, 0, 0, 0.6) !important;
        position: relative !important;
        transition:
          transform 0.3s ease,
          box-shadow 0.3s ease !important;
        display: flex !important;
        flex-direction: column !important;
        margin: 25px auto !important;
      }
      .hero-cards .project-card:hover {
        transform: translateX(-6px) scale(1.02) !important;
        box-shadow: 0 18px 45px rgba(0, 0, 0, 0.78) !important;
      }

      /* ── IMAGE: full image, zero cropping ── */
      .hero-cards .main-image {
        position: static !important;
        top: auto !important;
        left: auto !important;
        transform: none !important;
        width: 100% !important;
        height: auto !important;
        object-fit: unset !important;
        border-radius: 16px 16px 0 0 !important;
        z-index: 1 !important;
        display: block !important;
      }

      /* ── INFO BAR below image ── */
      .hero-cards .info {
        position: static !important;
        display: flex !important;
        justify-content: space-between !important;
        align-items: center !important;
        color: #fff !important;
        font-size: 11px !important;
        padding: 10px 16px 12px !important;
        background: transparent !important;
        border-top: 1px solid rgba(255, 255, 255, 0.1) !important;
        z-index: 2 !important;
      }
      .hero-cards .center-text {
        text-align: center !important;
      }
      .hero-cards .center-text h3 {
        font-size: 13px !important;
        margin: 0 !important;
        color: #fff !important;
        font-weight: 600 !important;
      }
      .hero-cards .center-text p {
        font-size: 10px !important;
        color: rgba(255, 255, 255, 0.6) !important;
        margin: 3px 0 0 !important;
      }
      .hero-cards span {
        color: rgba(255, 255, 255, 0.45) !important;
        font-size: 10px !important;
      }

      /* ── NAVBAR on top ── */
      .navbar {
        position: absolute !important;
        top: 0 !important;
        left: 0 !important;
        width: 100% !important;
        z-index: 200 !important;
      }

      /* ────────────────────────────────
         TABLET / iPAD  (≤ 1024px)
         Narrower column, smaller cards
      ──────────────────────────────── */
      @media (max-width: 1024px) {
        .hero-cards {
          width: 340px !important;
          gap: 12px !important;
          padding: 75px 14px 14px 14px !important;
        }
        .hero-cards .project-card {
          width: 312px !important;
        }
        .hero-cards .main-image {
          height: auto !important;
          object-fit: unset !important;
        }
      }

      /* ────────────────────────────────
         MOBILE  (≤ 768px)
         Cards move to horizontal strip
         at the bottom of the screen
      ──────────────────────────────── */
      @media (max-width: 768px) {
        .hero-cards {
          position: absolute !important;
          top: auto !important;
          bottom: 0 !important;
          right: 0 !important;
          left: 0 !important;
          width: 100% !important;
          height: auto !important;
          flex-direction: row !important;
          justify-content: flex-start !important;
          align-items: stretch !important;
          gap: 10px !important;
          padding: 10px 12px !important;
          overflow-x: auto !important;
          overflow-y: hidden !important;
          background: linear-gradient(
            transparent,
            rgba(0, 0, 0, 0.55)
          ) !important;
        }
        .hero-cards .project-card {
          width: 190px !important;
          min-width: 190px !important;
          flex-shrink: 0 !important;
        }
        .hero-cards .main-image {
          height: auto !important;
          object-fit: unset !important;
          border-radius: 14px 14px 0 0 !important;
        }
        .hero-cards .center-text h3 {
          font-size: 11px !important;
        }
        .hero-cards .center-text p {
          font-size: 9px !important;
        }
        .hero-cards .info {
          padding: 8px 10px 10px !important;
        }
      }
    </style>
  </head>

  <body>
    <div class="custom-cursor"></div>
    <div class="superman">
      <video class="bg-video" autoplay loop muted playsinline>

      <div class="hero-cards">

          <div class="info">

            <div class="center-text">

              <p>Visiting card</p>
            </div>

            <span>© 2025</span>
          </div>
        </div>

        <div class="project-card">
          <div class="blur-bg2"></div>

          <img src="ramburners.jpg" alt="Project Image" class="main-image" />

          <div class="info">
            <span>(02)</span>

            <div class="center-text">
              <h3>Ram Burners</h3>
              <p>Brand Identity</p>
            </div>

            <span>© 2025</span>
          </div>
        </div>

        <div class="project-card">
          <div class="blur-bg3"></div>

          <img src="shirtdesign.jpg" alt="Project Image" class="main-image" />

          <div class="info">
            <span>(03)</span>

            <div class="center-text">
              <h3>Shirt Design</h3>
              <p>Apparel Design</p>
            </div>

            <span>© 2025</span>
          </div>
        </div>

        <div class="project-card">
          <div class="blur-bg4"></div>

          <img src="wania.jpg" alt="Project Image" class="main-image" />

          <div class="info">
            <span>(04)</span>

            <div class="center-text">
              <h3>Wania Suhail</h3>

            </div>

            <span>© 2025</span>

        </div>
      </div>

      <nav class="navbar">
    <a href="/239.html" class="HOME">
      MIAN HADI
    </a>
        <a href="#contactForm" class="btn-container fade-up"
          >Let's Work Together</a
        >
      </nav>
      <header>
        <!-- Add any hero text you want here for portfolio.html -->
      </header>
    </div>

    <script>
      const cursor = document.querySelector(".custom-cursor");
      const hoverElements = document.querySelectorAll(
        "a, button, .portfolio-block, input, textarea",
      );

      document.addEventListener("mousemove", (e) => {
        cursor.style.left = e.clientX + "px";
        cursor.style.top = e.clientY + "px";
      });

      hoverElements.forEach((el) => {
        el.addEventListener("mouseenter", () => cursor.classList.add("hover"));
        el.addEventListener("mouseleave", () =>
          cursor.classList.remove("hover"),
        );
      });

      /* ── Drag to scroll gallery ── */
      const track = document.getElementById("scrollTrack");
      if (track) {
        let isDown = false,
          startX,
          scrollLeft;
        track.addEventListener("mousedown", (e) => {
          isDown = true;
          track.classList.add("active");
          startX = e.pageX - track.offsetLeft;
          scrollLeft = track.scrollLeft;
        });
        track.addEventListener("mouseleave", () => {
          isDown = false;
        });
        track.addEventListener("mouseup", () => {
          isDown = false;
        });
        track.addEventListener("mousemove", (e) => {
          if (!isDown) return;
          e.preventDefault();
          const x = e.pageX - track.offsetLeft;
          track.scrollLeft = scrollLeft - (x - startX) * 1.5;
        });
      }
    </script>
  </body>
</html>
